site_name: InstrumentControl
site_description: Universal Windows instrument control software for VISA/GPIB/serial lab equipment
site_author: Bartek
site_url: https://bartkepl.github.io/InstrumentControl/
repo_name: bartkepl/InstrumentControl
repo_url: https://github.com/bartkepl/InstrumentControl
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Roboto
    code: Roboto Mono
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate
    - toc.follow

plugins:
  - search:
      lang: en

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

extra:
  version:
    provider: mike
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/bartkepl/InstrumentControl

nav:
  - Home: index.md
  - User Guide:
    - Installation: user-guide/installation.md
    - Quick Start: user-guide/quick-start.md
    - Connection Manager: user-guide/connection-manager.md
    - Simulation Mode: user-guide/simulation-mode.md
    - Front Panel: user-guide/front-panel.md
    - Sequence Editor: user-guide/sequence-editor.md
    - Block Reference: user-guide/blocks-reference.md
    - Data Viewer: user-guide/data-viewer.md
    - Language / Localization: user-guide/language.md
    - Automatic Updates: user-guide/automatic-updates.md
    - Instruments:
      - HP 34401A (DMM): user-guide/instruments/hp34401a.md
      - Agilent 34970A (DAQ): user-guide/instruments/agilent34970a.md
      - Keithley 2000 (DMM): user-guide/instruments/keithley2000.md
      - ITECH IT6922B (PSU): user-guide/instruments/itech-it6922b.md
      - R&S RTB2004 (Oscilloscope): user-guide/instruments/rtb2004.md
      - CTS Chamber: user-guide/instruments/cts-chamber.md
      - Rigol DS1054Z/DS1104Z (Oscilloscope): user-guide/instruments/rigol-ds1000z.md
  - Developer Guide:
    - Architecture: developer-guide/architecture.md
    - Plugin Development: developer-guide/plugin-development.md
    - Core Interfaces: developer-guide/interfaces.md
    - Services Reference: developer-guide/services.md
    - Custom Blocks: developer-guide/custom-blocks.md
    - Testing & CI: developer-guide/testing.md
