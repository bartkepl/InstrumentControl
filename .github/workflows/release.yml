name: Build and Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write   # required to create releases and push tags

    steps:
      # ── Checkout ─────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # ── Version ──────────────────────────────────────────────────────────────
      # VERSION file contains "MAJOR.MINOR" (e.g. "1.0").
      # The patch number is the GitHub Actions run number, which increments
      # automatically on every push — no commit loop needed.
      - name: Compute version
        id: ver
        shell: pwsh
        run: |
          $base = (Get-Content VERSION -Raw).Trim()
          $v    = "$base.${{ github.run_number }}"
          "version=$v" | Out-File -Append $env:GITHUB_OUTPUT
          "tag=v$v"    | Out-File -Append $env:GITHUB_OUTPUT
          Write-Host "Version: $v"

      # ── Build ─────────────────────────────────────────────────────────────────
      - name: Build Core
        run: >
          dotnet build src/InstrumentControl.Core/InstrumentControl.Core.csproj
          -c Release --nologo -v q
          -p:Version=${{ steps.ver.outputs.version }}

      - name: Build HP34401A
        run: >
          dotnet build instruments/HP34401A/HP34401A.csproj
          -c Release --nologo -v q
          -p:Version=${{ steps.ver.outputs.version }}

      - name: Build Agilent34970A
        run: >
          dotnet build instruments/Agilent34970A/Agilent34970A.csproj
          -c Release --nologo -v q
          -p:Version=${{ steps.ver.outputs.version }}

      - name: Build Keithley2000
        run: >
          dotnet build instruments/Keithley2000/Keithley2000.csproj
          -c Release --nologo -v q
          -p:Version=${{ steps.ver.outputs.version }}

      - name: Build ItechIT6922B
        run: >
          dotnet build instruments/ItechIT6922B/ItechIT6922B.csproj
          -c Release --nologo -v q
          -p:Version=${{ steps.ver.outputs.version }}

      - name: Build RTB2004
        run: >
          dotnet build instruments/RTB2004/RTB2004.csproj
          -c Release --nologo -v q
          -p:Version=${{ steps.ver.outputs.version }}

      - name: Build CTSChamber
        run: >
          dotnet build instruments/CTSChamber/CTSChamber.csproj
          -c Release --nologo -v q
          -p:Version=${{ steps.ver.outputs.version }}

      - name: Build RigolDS1000Z
        run: >
          dotnet build instruments/RigolDS1000Z/RigolDS1000Z.csproj
          -c Release --nologo -v q
          -p:Version=${{ steps.ver.outputs.version }}

      # ── Publish ───────────────────────────────────────────────────────────────
      - name: Publish app
        run: >
          dotnet publish src/InstrumentControl.App/InstrumentControl.App.csproj
          -c Release -r win-x64 --self-contained true
          -o artifacts/app --nologo -v q
          -p:Version=${{ steps.ver.outputs.version }}

      - name: Copy instrument DLLs
        shell: pwsh
        run: |
          $dest = "artifacts/app/instruments"
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          Copy-Item "instruments/HP34401A/bin/Release/net8.0-windows/HP34401A.dll"           $dest
          Copy-Item "instruments/Agilent34970A/bin/Release/net8.0-windows/Agilent34970A.dll" $dest
          Copy-Item "instruments/Keithley2000/bin/Release/net8.0-windows/Keithley2000.dll"   $dest
          Copy-Item "instruments/ItechIT6922B/bin/Release/net8.0-windows/ItechIT6922B.dll" $dest
          Copy-Item "instruments/RTB2004/bin/Release/net8.0-windows/RTB2004.dll"           $dest
          Copy-Item "instruments/CTSChamber/bin/Release/net8.0-windows/CTSChamber.dll"     $dest
          Copy-Item "instruments/RigolDS1000Z/bin/Release/net8.0-windows/RigolDS1000Z.dll" $dest

      - name: Create release archive
        shell: pwsh
        run: |
          Compress-Archive -Path "artifacts/app/*" `
            -DestinationPath "InstrumentControl-${{ steps.ver.outputs.version }}-win-x64.zip"

      # ── Velopack installer (main branch only) ─────────────────────────────────
      - name: Install vpk
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: dotnet tool install -g vpk

      - name: Pack with Velopack
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: >
          vpk pack
          --packId InstrumentControl
          --packVersion ${{ steps.ver.outputs.version }}
          --packDir artifacts/app
          --mainExe InstrumentControl.exe
          --outputDir artifacts/releases

      # ── Release (main branch only) ────────────────────────────────────────────
      - name: Publish GitHub Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: InstrumentControl ${{ steps.ver.outputs.version }}
          generate_release_notes: true
          files: |
            InstrumentControl-${{ steps.ver.outputs.version }}-win-x64.zip
            artifacts/releases/*
